<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Happy Birthday My Queen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Georgia','Times New Roman',serif;background:#0a0010}
.page{position:fixed;top:0;left:0;width:100%;height:100%;transition:transform .8s cubic-bezier(.77,0,.175,1),opacity .8s ease}
.page.hidden{transform:translateY(-100%);opacity:0;pointer-events:none}
.page.active{transform:translateY(0);opacity:1}

/* ===== SECTION 1: BIRTHDAY WELCOME ===== */
#birthdayPage{background:linear-gradient(135deg,#1a0a2e,#2d1b69,#4a1942,#1a0a2e);background-size:400% 400%;animation:gradBg 8s ease infinite;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
@keyframes gradBg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.birthday-content{text-align:center;z-index:10;position:relative;padding:20px}
.birthday-cake{font-size:80px;animation:bounce 2s ease infinite;display:block;margin-bottom:10px;filter:drop-shadow(0 0 20px rgba(255,200,100,.6))}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}

.birthday-title{font-size:clamp(2rem,7vw,4.5rem);font-weight:700;background:linear-gradient(135deg,#ff6b9d,#c44569,#ff6b9d,#f8b500,#ff6b9d);background-size:300% 300%;animation:shimmer 3s ease infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;line-height:1.2;margin-bottom:15px;letter-spacing:2px}
@keyframes shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.birthday-subtitle{font-size:clamp(1rem,3vw,1.5rem);color:rgba(255,200,230,.8);margin-bottom:40px;font-style:italic;animation:fadeInUp 1s ease .5s both}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.sparkle-ring{position:absolute;width:300px;height:300px;border-radius:50%;border:2px solid rgba(255,107,157,.2);top:50%;left:50%;transform:translate(-50%,-50%);animation:ringPulse 3s ease infinite}
.sparkle-ring:nth-child(2){width:400px;height:400px;animation-delay:.5s;border-color:rgba(248,181,0,.15)}
.sparkle-ring:nth-child(3){width:500px;height:500px;animation-delay:1s;border-color:rgba(196,69,105,.1)}
@keyframes ringPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}}

.swipe-indicator{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;animation:fadeInUp 1s ease 1.5s both;z-index:10}
.swipe-text{color:rgba(255,200,230,.9);font-size:clamp(.9rem,2.5vw,1.2rem);margin-bottom:10px;font-style:italic}
.swipe-arrow{font-size:30px;color:#ff6b9d;animation:arrowUp 1.5s ease infinite;display:block}
@keyframes arrowUp{0%{transform:translateY(10px);opacity:0}50%{opacity:1}100%{transform:translateY(-20px);opacity:0}}

/* Balloons */
.balloon{position:absolute;bottom:-150px;width:40px;height:52px;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;z-index:5;animation:floatUp linear infinite}
.balloon::after{content:'';position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);width:1px;height:30px;background:rgba(255,255,255,.3)}
.balloon::before{content:'';position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:6px solid currentColor;opacity:.6}

/* Floating Hearts */
.heart{position:absolute;font-size:20px;opacity:0;animation:floatHeart linear infinite;z-index:5;pointer-events:none}
@keyframes floatHeart{0%{transform:translateY(0) rotate(0deg) scale(0);opacity:0}10%{opacity:.8;transform:translateY(-10vh) rotate(15deg) scale(1)}90%{opacity:.6}100%{transform:translateY(-100vh) rotate(-15deg) scale(.5);opacity:0}}

/* Sparkles */
.sparkle{position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;animation:sparkleAnim ease-in-out infinite;z-index:5;pointer-events:none}
@keyframes sparkleAnim{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}

/* ===== SECTION 2: PROPOSAL ===== */
#proposalPage{background:linear-gradient(135deg,#0d0221,#1a0533,#2d1b69,#1a0533);background-size:400% 400%;animation:gradBg 10s ease infinite;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;transform:translateY(100%);opacity:0}

.proposal-content{text-align:center;z-index:10;position:relative;padding:20px}
.proposal-crown{font-size:70px;animation:crownFloat 3s ease infinite;display:block;margin-bottom:10px;filter:drop-shadow(0 0 25px rgba(248,181,0,.7))}
@keyframes crownFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-15px) rotate(3deg)}}

.proposal-title{font-size:clamp(1.8rem,6vw,3.8rem);font-weight:700;background:linear-gradient(135deg,#f8b500,#ff6b9d,#f8b500,#ff6b9d);background-size:300% 300%;animation:shimmer 4s ease infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:40px;letter-spacing:1px}

.glass-box{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:30px;padding:40px 30px;max-width:450px;width:90%;margin:0 auto;box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 0 80px rgba(255,107,157,.05)}

.btn-yes{background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;border:none;padding:18px 60px;font-size:1.3rem;font-weight:700;border-radius:50px;cursor:pointer;font-family:inherit;transition:all .3s ease;box-shadow:0 5px 25px rgba(255,107,157,.4);position:relative;overflow:hidden;letter-spacing:1px}
.btn-yes:hover{transform:scale(1.08);box-shadow:0 8px 35px rgba(255,107,157,.6)}
.btn-yes::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(transparent,rgba(255,255,255,.15),transparent);transform:rotate(45deg);animation:btnShine 3s ease infinite}
@keyframes btnShine{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}

.btn-no{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.2);padding:14px 40px;font-size:1rem;font-weight:600;border-radius:50px;cursor:pointer;font-family:inherit;position:fixed;transition:all .15s ease;z-index:100;backdrop-filter:blur(5px)}

/* ===== CELEBRATION MODAL ===== */
.celebration-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,0,20,.85);backdrop-filter:blur(10px);z-index:2000;display:none;align-items:center;justify-content:center;animation:fadeIn .5s ease}
.celebration-overlay.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.celebration-card{background:linear-gradient(135deg,#1a0a2e,#2d1b69);border:2px solid rgba(255,107,157,.3);border-radius:30px;padding:35px 25px;max-width:480px;width:92%;text-align:center;position:relative;animation:popIn .6s cubic-bezier(.68,-.55,.265,1.55);box-shadow:0 0 60px rgba(255,107,157,.2),0 0 120px rgba(248,181,0,.1);overflow:hidden}
@keyframes popIn{from{transform:scale(0) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}

.celebration-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(255,107,157,.05),transparent,rgba(248,181,0,.05),transparent);animation:rotateBg 8s linear infinite}
@keyframes rotateBg{to{transform:rotate(360deg)}}

.love-message{font-size:clamp(1.5rem,5vw,2.2rem);font-weight:700;background:linear-gradient(135deg,#ff6b9d,#f8b500,#ff6b9d);background-size:300% 300%;animation:shimmer 3s ease infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;position:relative;z-index:1}

.love-sub{font-size:clamp(1rem,3vw,1.3rem);color:rgba(255,200,230,.9);margin-bottom:25px;font-style:italic;line-height:1.6;position:relative;z-index:1}

.couple-frame{width:280px;height:220px;margin:0 auto 20px;position:relative;z-index:1;border-radius:20px;overflow:hidden;border:3px solid rgba(255,107,157,.4);box-shadow:0 0 30px rgba(255,107,157,.15),0 0 60px rgba(248,181,0,.08)}

/* Ring icon */
.ring-icon{font-size:40px;display:block;margin-bottom:15px;animation:ringGlow 2s ease infinite;position:relative;z-index:1}
@keyframes ringGlow{0%,100%{filter:drop-shadow(0 0 10px rgba(248,181,0,.5))}50%{filter:drop-shadow(0 0 25px rgba(248,181,0,.9))}}

/* Confetti */
.confetti{position:fixed;width:10px;height:10px;z-index:3000;pointer-events:none;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* Heart burst */
.heart-burst{position:fixed;font-size:24px;z-index:3000;pointer-events:none;animation:heartBurst 1.5s ease forwards}
@keyframes heartBurst{0%{transform:scale(0) translateY(0);opacity:1}50%{transform:scale(1.5) translateY(-50px);opacity:.8}100%{transform:scale(.5) translateY(-120px);opacity:0}}

/* Music button */
.music-btn{position:fixed;top:20px;right:20px;width:45px;height:45px;border-radius:50%;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);color:#ff6b9d;font-size:20px;cursor:pointer;z-index:5000;display:flex;align-items:center;justify-content:center;transition:all .3s ease}
.music-btn:hover{background:rgba(255,107,157,.2);transform:scale(1.1)}
.music-btn.playing{animation:musicPulse 1s ease infinite}
@keyframes musicPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,157,.4)}50%{box-shadow:0 0 0 12px rgba(255,107,157,0)}}

/* Rose decorations */
.rose{position:absolute;font-size:28px;opacity:.6;animation:roseFloat 4s ease infinite;z-index:2;pointer-events:none}
@keyframes roseFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-10px) rotate(10deg)}}

/* Glow orbs */
.glow-orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.15;z-index:1;pointer-events:none}

@media(max-width:600px){
  .birthday-cake{font-size:60px}
  .proposal-crown{font-size:50px}
  .glass-box{padding:30px 20px}
  .btn-yes{padding:15px 45px;font-size:1.1rem}
  .couple-frame{width:240px;height:190px}
  .celebration-card{padding:25px 18px}
}
</style>
</head>
<body>

<!-- ===== SECTION 1: BIRTHDAY WELCOME ===== -->
<div id="birthdayPage" class="page active">
  <div class="sparkle-ring"></div>
  <div class="sparkle-ring"></div>
  <div class="sparkle-ring"></div>
  <div class="glow-orb" style="width:300px;height:300px;background:#ff6b9d;top:10%;left:5%"></div>
  <div class="glow-orb" style="width:250px;height:250px;background:#f8b500;bottom:15%;right:5%"></div>
  <div class="glow-orb" style="width:200px;height:200px;background:#c44569;top:50%;left:50%;transform:translate(-50%,-50%)"></div>

  <div class="birthday-content">
    <span class="birthday-cake">🎂</span>
    <h1 class="birthday-title">Happy Birthday<br>My Queen</h1>

  <div class="swipe-indicator">
    <span class="swipe-text">Swipe Up To Enter Your Surprise ❤️</span>

</div>

<!-- ===== SECTION 2: PROPOSAL ===== -->
<div id="proposalPage" class="page">
  <div class="glow-orb" style="width:300px;height:300px;background:#ff6b9d;top:5%;right:0"></div>
  <div class="glow-orb" style="width:250px;height:250px;background:#f8b500;bottom:10%;left:0"></div>

  <div class="proposal-content">
    <span class="proposal-crown">👑</span>
    <h1 class="proposal-title">Will You Be My<br>Future Queen? ❤️</h1>
    <div class="glass-box">
      <button class="btn-yes" id="btnYes" onclick="sayYes()">YES 💖</button>
    </div>
  </div>

  <button class="btn-no" id="btnNo">NO 😢</button>
</div>

<!-- ===== CELEBRATION MODAL ===== -->
<div class="celebration-overlay" id="celebrationOverlay">
  <div class="celebration-card">
    <div class="ring-icon">💍</div>
    <h2 class="love-message">I Love U My Queen 👑❤️</h2>
    <p class="love-sub">And I Will Be Your Future<br>InshaAllah 💍✨</p>
    <div class="couple-frame">
      <svg viewBox="0 0 280 220" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
        <!-- Background -->
        <defs>
          <radialGradient id="glow1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ff6b9d" stop-opacity=".2"/><stop offset="100%" stop-color="transparent"/></radialGradient>
          <radialGradient id="skinM" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="#d4a574"/><stop offset="100%" stop-color="#c4956a"/></radialGradient>
          <radialGradient id="skinF" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="#e8b89d"/><stop offset="100%" stop-color="#daa888"/></radialGradient>
        </defs>
        <rect width="280" height="220" fill="#1a0a2e"/>
        <circle cx="140" cy="120" r="100" fill="url(#glow1)"/>
        <!-- Stars -->
        <circle cx="30" cy="30" r="1.5" fill="#fff" opacity=".6"><animate attributeName="opacity" values=".3;1;.3" dur="2s" repeatCount="indefinite"/></circle>
        <circle cx="250" cy="25" r="1" fill="#fff" opacity=".5"><animate attributeName="opacity" values=".5;1;.5" dur="1.8s" repeatCount="indefinite"/></circle>
        <circle cx="60" cy="190" r="1" fill="#fff" opacity=".4"><animate attributeName="opacity" values=".2;.8;.2" dur="2.5s" repeatCount="indefinite"/></circle>
        <circle cx="220" cy="200" r="1.5" fill="#fff" opacity=".5"><animate attributeName="opacity" values=".3;1;.3" dur="3s" repeatCount="indefinite"/></circle>
        <circle cx="140" cy="15" r="1" fill="#fff" opacity=".4"><animate attributeName="opacity" values=".4;.9;.4" dur="2.2s" repeatCount="indefinite"/></circle>
        <!-- Heart above -->
        <text x="140" y="42" text-anchor="middle" font-size="22" fill="#ff6b9d" opacity=".9">❤</text>
        <!-- Man (left) -->
        <ellipse cx="105" cy="155" rx="28" ry="50" fill="#2d1b69"/><!-- body -->
        <rect x="85" y="130" width="40" height="50" rx="15" fill="#3b2480"/><!-- shirt -->
        <circle cx="105" cy="95" r="22" fill="url(#skinM)"/><!-- head -->
        <ellipse cx="105" cy="78" rx="24" ry="14" fill="#1a0a2e"/><!-- hair top -->
        <rect x="82" y="78" width="46" height="8" rx="3" fill="#1a0a2e"/><!-- hair -->
        <ellipse cx="97" cy="95" rx="3" ry="3.5" fill="#1a0a2e"/><!-- left eye -->
        <ellipse cx="113" cy="95" rx="3" ry="3.5" fill="#1a0a2e"/><!-- right eye -->
        <path d="M99 104 Q105 110 111 104" stroke="#c44569" stroke-width="2" fill="none" stroke-linecap="round"/><!-- smile -->
        <!-- Woman (right) -->
        <ellipse cx="175" cy="155" rx="28" ry="50" fill="#ff6b9d"/><!-- dress -->
        <path d="M150 130 Q175 120 200 130 L195 190 Q175 200 155 190 Z" fill="#c44569"/><!-- dress shape -->
        <circle cx="175" cy="95" r="22" fill="url(#skinF)"/><!-- head -->
        <path d="M153 90 Q155 65 175 62 Q195 65 197 90" fill="#1a0a2e"/><!-- hijab top -->
        <path d="M150 88 Q148 110 155 130 L175 125 L195 130 Q202 110 200 88" fill="#ff6b9d" opacity=".9"/><!-- hijab -->
        <path d="M155 88 Q175 82 195 88" fill="#c44569" opacity=".8"/><!-- hijab edge -->
        <ellipse cx="168" cy="95" rx="3" ry="3.5" fill="#1a0a2e"/><!-- left eye -->
        <ellipse cx="182" cy="95" rx="3" ry="3.5" fill="#1a0a2e"/><!-- right eye -->
        <path d="M170 104 Q175 109 180 104" stroke="#c44569" stroke-width="2" fill="none" stroke-linecap="round"/><!-- smile -->
        <!-- Blush -->
        <ellipse cx="164" cy="100" rx="5" ry="3" fill="#ff6b9d" opacity=".3"/>
        <ellipse cx="186" cy="100" rx="5" ry="3" fill="#ff6b9d" opacity=".3"/>
        <!-- Holding hands -->
        <ellipse cx="140" cy="155" rx="14" ry="10" fill="url(#skinM)" opacity=".9"/>
        <ellipse cx="140" cy="155" rx="12" ry="8" fill="url(#skinF)" opacity=".9"/>
        <!-- Ring sparkle -->
        <circle cx="140" cy="152" r="3" fill="#f8b500"><animate attributeName="r" values="2;4;2" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values=".5;1;.5" dur="1.5s" repeatCount="indefinite"/></circle>
        <!-- Small hearts -->
        <text x="75" y="72" font-size="10" fill="#ff6b9d" opacity=".7"><animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>♥</text>
        <text x="195" y="68" font-size="8" fill="#ff6b9d" opacity=".5"><animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin=".5s"/>♥</text>
        <text x="130" y="58" font-size="6" fill="#f8b500" opacity=".5"><animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="1s"/>✦</text>

        <ellipse cx="140" cy="205" rx="80" ry="8" fill="#ff6b9d" opacity=".1"/>
      </svg>
    </div>
    <div style="position:relative;z-index:1">
      <span style="font-size:28px;display:inline-block;animation:roseFloat 3s ease infinite">🌹</span>
      <span style="font-size:28px;display:inline-block;animation:roseFloat 3s ease infinite .5s">🌹</span>
      <span style="font-size:28px;display:inline-block;animation:roseFloat 3s ease infinite 1s">🌹</span>
    </div>
  </div>
</div>

<!-- Music Toggle -->
<button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="Toggle Music">🎵</button>

<script>
// ===== GLOBALS =====
var currentPage = 'birthday';
var noBtnAngle = 0;
var noBtnRadius = 120;
var noBtnSpeed = 0.03;
var noBtnCenterX = 0;
var noBtnCenterY = 0;
var noBtnHovered = false;
var noBtnMoving = true;
var audioCtx = null;
var musicPlaying = false;
var musicInterval = null;

// ===== INIT =====
window.addEventListener('DOMContentLoaded', function() {
  createBalloons();
  createFloatingHearts('birthdayPage', 15);
  createFloatingHearts('proposalPage', 20);
  createSparkles('birthdayPage', 30);
  createSparkles('proposalPage', 25);
  initNoButton();
  initSwipeDetection();
  positionNoBtn();
});

// ===== BALLOONS =====
function createBalloons() {
  var page = document.getElementById('birthdayPage');
  var colors = ['#ff6b9d','#f8b500','#c44569','#ff85a2','#ffa07a','#dda0dd','#87ceeb','#98fb98'];
  for (var i = 0; i < 12; i++) {
    var b = document.createElement('div');
    b.className = 'balloon';
    b.style.left = (Math.random() * 90 + 5) + '%';
    b.style.background = colors[Math.floor(Math.random() * colors.length)];
    b.style.animationDuration = (8 + Math.random() * 12) + 's';
    b.style.animationDelay = (Math.random() * 10) + 's';
    b.style.width = (30 + Math.random() * 20) + 'px';
    b.style.height = (38 + Math.random() * 25) + 'px';
    page.appendChild(b);
  }
}

// ===== FLOATING HEARTS =====
function createFloatingHearts(pageId, count) {
  var page = document.getElementById(pageId);
  var hearts = ['❤','💖','💕','💗','💓','💘','♥'];
  for (var i = 0; i < count; i++) {
    var h = document.createElement('div');
    h.className = 'heart';
    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    h.style.left = (Math.random() * 100) + '%';
    h.style.bottom = '-5%';
    h.style.fontSize = (14 + Math.random() * 20) + 'px';
    h.style.animationDuration = (6 + Math.random() * 8) + 's';
    h.style.animationDelay = (Math.random() * 10) + 's';
    page.appendChild(h);
  }
}

// ===== SPARKLES =====
function createSparkles(pageId, count) {
  var page = document.getElementById(pageId);
  for (var i = 0; i < count; i++) {
    var s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = (Math.random() * 100) + '%';
    s.style.top = (Math.random() * 100) + '%';
    s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    s.style.animationDelay = (Math.random() * 3) + 's';
    var colors = ['#fff','#ff6b9d','#f8b500','#ffa07a'];
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    s.style.boxShadow = '0 0 6px ' + s.style.background;
    page.appendChild(s);
  }
}

// ===== SWIPE DETECTION =====
function initSwipeDetection() {
  var startY = 0;
  var distY = 0;
  var isDragging = false;

  // Touch
  document.getElementById('birthdayPage').addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
    isDragging = true;
  }, {passive: true});

  document.getElementById('birthdayPage').addEventListener('touchmove', function(e) {
    if (!isDragging) return;
    distY = startY - e.touches[0].clientY;
    if (distY > 60) {
      goToProposal();
      isDragging = false;
    }
  }, {passive: true});

  // Mouse wheel
  document.getElementById('birthdayPage').addEventListener('wheel', function(e) {
    if (e.deltaY < -30) {
      goToProposal();
    }
  }, {passive: true});

  // Mouse drag
  document.getElementById('birthdayPage').addEventListener('mousedown', function(e) {
    startY = e.clientY;
    isDragging = true;
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging || currentPage !== 'birthday') return;
    distY = startY - e.clientY;
    if (distY > 60) {
      goToProposal();
      isDragging = false;
    }
  });

  document.addEventListener('mouseup', function() {
    isDragging = false;
  });

  // Click on swipe indicator
  document.querySelector('.swipe-indicator').addEventListener('click', function() {
    goToProposal();
  });
}

function goToProposal() {
  if (currentPage !== 'birthday') return;
  currentPage = 'proposal';
  document.getElementById('birthdayPage').classList.add('hidden');
  document.getElementById('birthdayPage').classList.remove('active');
  var pp = document.getElementById('proposalPage');
  pp.style.transform = 'translateY(0)';
  pp.style.opacity = '1';
  pp.classList.add('active');
  document.body.style.overflow = 'hidden';
}

// ===== NO BUTTON =====
function positionNoBtn() {
  var btn = document.getElementById('btnNo');
  var w = window.innerWidth;
  var h = window.innerHeight;
  noBtnCenterX = w / 2;
  noBtnCenterY = h / 2;
  btn.style.left = (noBtnCenterX - 50) + 'px';
  btn.style.top = (noBtnCenterY + 100) + 'px';
}

function initNoButton() {
  var btn = document.getElementById('btnNo');

  btn.addEventListener('mouseenter', function() { noBtnHovered = true; });
  btn.addEventListener('mouseleave', function() { noBtnHovered = false; });
  btn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    noBtnHovered = true;
    // Make it run away on touch
    moveNoBtnAway(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive: false});
  btn.addEventListener('touchend', function() { noBtnHovered = false; });

  animateNoButton();
}

function moveNoBtnAway(touchX, touchY) {
  var btn = document.getElementById('btnNo');
  var w = window.innerWidth;
  var h = window.innerHeight;
  var bw = btn.offsetWidth;
  var bh = btn.offsetHeight;
  // Move to random position far from touch
  var newX, newY, dist;
  do {
    newX = Math.random() * (w - bw);
    newY = Math.random() * (h - bh);
    var dx = newX + bw/2 - touchX;
    var dy = newY + bh/2 - touchY;
    dist = Math.sqrt(dx*dx + dy*dy);
  } while (dist < 150);
  btn.style.left = newX + 'px';
  btn.style.top = newY + 'px';
  noBtnCenterX = newX + bw/2;
  noBtnCenterY = newY + bh/2;
  noBtnAngle = Math.random() * Math.PI * 2;
}

function animateNoButton() {
  var btn = document.getElementById('btnNo');
  if (!noBtnHovered && currentPage === 'proposal') {
    noBtnAngle += noBtnSpeed;
    var w = window.innerWidth;
    var h = window.innerHeight;
    var bw = btn.offsetWidth;
    var bh = btn.offsetHeight;
    // Mix circular + random
    var rx = noBtnRadius * Math.cos(noBtnAngle) + 30 * Math.sin(noBtnAngle * 2.3);
    var ry = noBtnRadius * Math.sin(noBtnAngle) + 25 * Math.cos(noBtnAngle * 1.7);
    var newX = noBtnCenterX + rx - bw/2;
    var newY = noBtnCenterY + ry - bh/2;
    // Keep on screen
    newX = Math.max(10, Math.min(w - bw - 10, newX));
    newY = Math.max(10, Math.min(h - bh - 10, newY));
    btn.style.left = newX + 'px';
    btn.style.top = newY + 'px';
  }
  requestAnimationFrame(animateNoButton);
}

window.addEventListener('resize', function() {
  if (currentPage === 'proposal') positionNoBtn();
});

// ===== YES BUTTON =====
function sayYes() {
  // Show celebration
  document.getElementById('celebrationOverlay').classList.add('show');
  // Confetti burst
  createConfetti();
  // Heart burst
  createHeartBurst();
  // Add more hearts to celebration
  setTimeout(function() { createHeartBurst(); }, 500);
  setTimeout(function() { createHeartBurst(); }, 1000);
}

// ===== CONFETTI =====
function createConfetti() {
  var colors = ['#ff6b9d','#f8b500','#c44569','#ff85a2','#87ceeb','#98fb98','#dda0dd','#ffa07a','#fff'];
  for (var i = 0; i < 80; i++) {
    (function(i) {
      setTimeout(function() {
        var c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = (Math.random() * 100) + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.width = (6 + Math.random() * 10) + 'px';
        c.style.height = (6 + Math.random() * 10) + 'px';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.animationDuration = (2 + Math.random() * 3) + 's';
        document.body.appendChild(c);
        setTimeout(function() { c.remove(); }, 5000);
      }, i * 30);
    })(i);
  }
}

// ===== HEART BURST =====
function createHeartBurst() {
  var hearts = ['❤','💖','💕','💗','💓','💘','💍','✨','👑','🌹'];
  for (var i = 0; i < 20; i++) {
    (function(i) {
      setTimeout(function() {
        var h = document.createElement('div');
        h.className = 'heart-burst';
        h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        h.style.left = (20 + Math.random() * 60) + 'vw';
        h.style.top = (50 + Math.random() * 40) + 'vh';
        h.style.fontSize = (18 + Math.random() * 24) + 'px';
        document.body.appendChild(h);
        setTimeout(function() { h.remove(); }, 1500);
      }, i * 80);
    })(i);
  }
}

// ===== MUSIC =====
function toggleMusic() {
  var btn = document.getElementById('musicBtn');
  if (!musicPlaying) {
    startMusic();
    btn.classList.add('playing');
    btn.textContent = '🎶';
    musicPlaying = true;
  } else {
    stopMusic();
    btn.classList.remove('playing');
    btn.textContent = '🎵';
    musicPlaying = false;
  }
}

function startMusic() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    playRomanticTune();
  } catch(e) {}
}

function stopMusic() {
  if (musicInterval) clearInterval(musicInterval);
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
}

function playRomanticTune() {
  // Simple romantic melody using Web Audio API
  var notes = [523.25,587.33,659.25,698.46,783.99,698.46,659.25,587.33,523.25,493.88,523.25,587.33,659.25,587.33,523.25,493.88];
  var noteIndex = 0;

  function playNote() {
    if (!audioCtx || audioCtx.state === 'closed') return;
    try {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = notes[noteIndex % notes.length];
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.5);
      noteIndex++;
    } catch(e) {}
  }

  playNote();
  musicInterval = setInterval(playNote, 500);
}
</script>
